version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: sarvasahay-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sarvasahay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-sarvasahay_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarvasahay"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sarvasahay-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sarvasahay-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sarvasahay-network
    restart: unless-stopped

  # SarvaSahay Application
  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: sarvasahay-app
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-sarvasahay}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-sarvasahay_db}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      
      # Government APIs
      PM_KISAN_API_KEY: ${PM_KISAN_API_KEY}
      PM_KISAN_API_URL: ${PM_KISAN_API_URL:-https://pmkisan.gov.in/api/v1}
      DBT_API_KEY: ${DBT_API_KEY}
      DBT_API_URL: ${DBT_API_URL:-https://dbtbharat.gov.in/api/v1}
      PFMS_API_KEY: ${PFMS_API_KEY}
      PFMS_API_URL: ${PFMS_API_URL:-https://pfms.nic.in/api/v1}
      
      # Notification Services
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      
      # Application
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_VERSION: ${API_VERSION:-v1}
      MAX_WORKERS: ${MAX_WORKERS:-4}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./ml/models:/app/ml/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sarvasahay-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: sarvasahay-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - sarvasahay-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  sarvasahay-network:
    driver: bridge
