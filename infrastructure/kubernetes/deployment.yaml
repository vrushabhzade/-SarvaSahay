# SarvaSahay Platform Kubernetes Deployment
# Implements horizontal scaling with auto-scaling capabilities
# Requirements: 9.2, 9.3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarvasahay-api
  namespace: sarvasahay
  labels:
    app: sarvasahay
    component: api
spec:
  replicas: 2  # Start with 2 replicas for high availability
  selector:
    matchLabels:
      app: sarvasahay
      component: api
  template:
    metadata:
      labels:
        app: sarvasahay
        component: api
    spec:
      containers:
      - name: sarvasahay-api
        image: sarvasahay/api:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sarvasahay-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: sarvasahay-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: sarvasahay-secrets
              key: secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      # Ensure pods are distributed across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - sarvasahay
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: sarvasahay-api-service
  namespace: sarvasahay
  labels:
    app: sarvasahay
    component: api
spec:
  type: LoadBalancer
  selector:
    app: sarvasahay
    component: api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP  # Sticky sessions for stateful operations
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Horizontal Pod Autoscaler
# Automatically scales based on CPU and memory usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sarvasahay-api-hpa
  namespace: sarvasahay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sarvasahay-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when CPU > 70%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up when memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

---
# Pod Disruption Budget
# Ensures minimum availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sarvasahay-api-pdb
  namespace: sarvasahay
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sarvasahay
      component: api
