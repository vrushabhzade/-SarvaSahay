# Nginx Ingress Configuration for Load Balancing
# Requirements: 9.2, 9.3

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sarvasahay-ingress
  namespace: sarvasahay
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Load balancing configuration
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    
    # Connection limits
    nginx.ingress.kubernetes.io/limit-connections: "100"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # Timeouts (5 second requirement for eligibility checks)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rpm: "6000"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # Health checks
    nginx.ingress.kubernetes.io/health-check-path: "/api/v1/health"
    nginx.ingress.kubernetes.io/health-check-interval: "30s"
    
spec:
  tls:
  - hosts:
    - sarvasahay.gov.in
    - api.sarvasahay.gov.in
    secretName: sarvasahay-tls
  rules:
  - host: sarvasahay.gov.in
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sarvasahay-api-service
            port:
              number: 80
  - host: api.sarvasahay.gov.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sarvasahay-api-service
            port:
              number: 80
